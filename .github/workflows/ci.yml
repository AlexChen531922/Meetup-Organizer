name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22]
    
    steps:
      # Step 3: Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 4: Set Up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Step 5: Print Environment Secrets
      - name: Print Env Secret
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: |
          echo "Secret 1 is: $MONGO_URI"
          echo "Secret 2 is: $JWT_SECRET"
          echo "Secret 3 is: $PORT"

      # Step 6: Stop Running Services in AWS
      - name: Stop Running Services in AWS
        run: pm2 stop all

      # Step 7: Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          npm install --global yarn
          yarn --version
          yarn install

      # Step 8: Install Frontend Dependencies and Build
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: |
          df -h
          sudo rm -rf ./build
          yarn install
          yarn run build

      # Step 9: Run Backend Tests
      - name: Run Backend Tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        working-directory: ./backend
        run: npm test

      # Step 10: Install Dependencies Using npm ci
      - name: Install Dependencies Root
        run: npm ci

      # Step 11: Create .env File and Add Secrets for Production in AWS
      - name: Create .env File and Add Secrets
        run: |
          cd ./backend
          touch .env
          echo "${{ secrets.PROD }}" > .env

      # Step 12: Start and Restart Services in AWS
      - name: Start and Restart Services in AWS
        run: |
          pm2 start all
          pm2 restart all